<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Switch 2 Bridge</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-state="scanning">
  <section class="glass-card">
    <header class="card-header" id="titlebar">
      <div class="eyebrow-badge">
        <span>Switch 2 Pro</span>
        <span class="sep" aria-hidden="true">&middot;</span>
        <span>Xbox Bridge</span>
      </div>
      <div class="card-controls">
        <button type="button" class="win-btn" id="btn-min" title="Minimize" aria-label="Minimize">&#x2500;</button>
        <button type="button" class="win-btn win-btn-close" id="btn-close" title="Close" aria-label="Close">&#x2715;</button>
      </div>
    </header>

    <div class="visual-stage">
      <div class="halo" aria-hidden="true"></div>
      <div class="controller-icon" role="img" aria-label="Controller"></div>
    </div>

    <h1 class="status-title" id="status-title">Scanning</h1>
    <p class="status-sub" id="status-sub">Hold SYNC to pair, or press any button to reconnect</p>
    <button type="button" class="action-btn" id="action-btn">Cancel</button>
  </section>

  <script src="qwebchannel.js"></script>
  <script src="app.js"></script>
</body>
</html>
